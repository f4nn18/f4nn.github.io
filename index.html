<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      :root {
        --bg: #0f1115;
        --card: #1a1d24;
        --border: #2a2f3a;

        /* 6 Palette Accent */
        --c1: #00d4ff;
        --c2: #ff3a3a;
        --c3: #7c5cff;
        --c4: #00ffa3;
        --c5: #ffb703;
        --c6: #ff6bff;
      }

      body {
        background: var(--bg);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
        max-width: 850px;
      }

      h1 {
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      h1 span {
        color: var(--c1);
      }

      h3 {
        font-weight: 400;
        color: #aaa;
        margin-bottom: 30px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      .card {
        background: var(--card);
        padding: 20px;
        border-radius: 14px;
        text-decoration: none;
        color: white;
        transition: 0.3s;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-6px);
      }

      .card:nth-child(1):hover {
        border-color: var(--c1);
      }
      .card:nth-child(2):hover {
        border-color: var(--c2);
      }
      .card:nth-child(3):hover {
        border-color: var(--c3);
      }

      .tag {
        font-size: 12px;
        margin-bottom: 10px;
        letter-spacing: 1px;
      }

      .card:nth-child(1) .tag {
        color: var(--c1);
      }
      .card:nth-child(2) .tag {
        color: var(--c2);
      }
      .card:nth-child(3) .tag {
        color: var(--c3);
      }

      .card h2 {
        margin-bottom: 8px;
      }

      .card p {
        font-size: 13px;
        color: #aaa;
      }

      /* Glow effect */
      .card::before {
        content: "";
        position: absolute;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        top: -50px;
        right: -50px;
        transform: rotate(25deg);
      }

      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Hi!, My Name <br />Muhammad <span>Irfan</span> Syafiq</h1>
      <h3>IT Support and Technician</h3>

      <div class="grid">
        <a class="card" href="Portfolio.html">
          <div class="tag">CAREER</div>
          <h2>Hire Me</h2>
          <p>Professional IT Support Engineer profile</p>
        </a>

        <a class="card" href="https://wa.me/62895354431318">
          <div class="tag">SERVICE</div>
          <h2>IT Support</h2>
          <p>Remote personal IT assistance</p>
        </a>

        <a class="card" href="https://wa.me/62895354431318">
          <div class="tag">COLLAB</div>
          <h2>Projects</h2>
          <p>Freelance & side technical work</p>
        </a>
      </div>
    </div>
  </body>
</html>
